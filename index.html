<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Display Barang</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 15px; width: 90%; font-size: 18px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #timerDisplay { font-size: 60px; margin: 20px 0; font-weight: bold; color: #333; }
        #targetInfo { font-size: 18px; color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Timer Display</h2>
    <input type="number" id="jumlah" placeholder="Masukkan total barang">
    <br>
    <button onclick="mulaiTimer()">Mulai Timer</button>
    
    <div id="timerDisplay">00:00</div>
    <div id="targetInfo">Target selesai: -</div>
</div>

<script>
    let interval;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function bunyikanAlarm(tipe) {
        let oscillator = audioCtx.createOscillator();
        oscillator.connect(audioCtx.destination);
        
        if (tipe === 'peringatan') {
            // Bunyi singkat 2 kali (untuk detik ke-5)
            oscillator.frequency.value = 440;
            oscillator.start();
            setTimeout(() => oscillator.stop(), 200);
        } else {
            // Bunyi panjang (untuk detik ke-0)
            oscillator.frequency.value = 880;
            oscillator.start();
            setTimeout(() => oscillator.stop(), 1500);
        }
    }

    function mulaiTimer() {
        clearInterval(interval);
        let jml = document.getElementById('jumlah').value;
        let totalDetik = jml * 9; 
        
        let target = new Date(new Date().getTime() + totalDetik * 1000);
        document.getElementById('targetInfo').innerHTML = 
            "Target selesai: " + target.getHours() + ":" + String(target.getMinutes()).padStart(2, '0');

        let sisa = totalDetik;
        interval = setInterval(() => {
            let m = Math.floor(sisa / 60);
            let s = sisa % 60;
            document.getElementById('timerDisplay').innerHTML = 
                String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
            
            // Peringatan di detik ke-5
            if (sisa === 5) {
                bunyikanAlarm('peringatan');
            }
            
            // Selesai di detik ke-0
            if (sisa <= 0) {
                clearInterval(interval);
                bunyikanAlarm('selesai');
            }
            sisa--;
        }, 1000);
    }
</script>
</body>
</html>
